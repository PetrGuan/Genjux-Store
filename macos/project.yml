name: GenjuxStore
options:
  bundleIdPrefix: com.petrguan
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: "NO"
    ENABLE_TESTABILITY: "YES"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
schemes:
  GenjuxStore:
    build:
      targets:
        GenjuxStore: all
    run:
      config: Debug
targets:
  GenjuxStore:
    type: application
    platform: macOS
    sources:
      - path: GenjuxStore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.petrguan.GenjuxStore
        INFOPLIST_FILE: GenjuxStore/App/Info.plist
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MACOSX_DEPLOYMENT_TARGET: "13.0"
